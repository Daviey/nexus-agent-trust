# HTTPS gateway: full access on 443, scoped access on 8443.
# Both use the same server cert. The forward proxy's CONNECT handler
# rewrites destination port 443 -> 8443 for agent traffic.

# Full access (port 443) - simulates human direct HTTPS
server {
    listen 443 ssl;
    server_name gateway;

    ssl_certificate     /etc/nginx/certs/server-cert.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;

    location / {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Scoped access (port 8443) - simulates agent via proxy
server {
    listen 8443 ssl;
    server_name gateway;

    ssl_certificate     /etc/nginx/certs/server-cert.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;

    location /repository/trusted/ {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
    }

    location /repository/ {
        return 403;
    }

    location / {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
    }
}
