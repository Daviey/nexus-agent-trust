# mTLS gateway: single port 443, differentiation by client cert.
#
# nginx terminates TLS with ssl_verify_client=optional. Clients that
# present a cert with CN=agent-proxy get scoped access. Clients without
# a cert (humans) get full access. The differentiation is cryptographic,
# not port-based.

# Map: extract whether the client cert identifies an agent
map $ssl_client_s_dn $is_agent {
    default           0;
    "~CN=agent-proxy" 1;
}

server {
    listen 443 ssl;
    server_name gateway;

    ssl_certificate     /etc/nginx/certs/server-cert.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;

    # Accept client cert if presented, do not require it.
    # Humans connect without a cert; agents present CN=agent-proxy.
    ssl_verify_client optional;
    ssl_client_certificate /etc/nginx/certs/ca-cert.pem;

    # Log the cert subject for debugging
    # Access log includes $ssl_client_s_dn via custom format

    # Agent requests: block untrusted repos
    # The if check evaluates the mapped $is_agent variable.
    location /repository/untrusted/ {
        if ($is_agent) {
            return 403 "mTLS port-gate: agent cert detected, untrusted repo blocked\n";
        }
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
    }

    # Everything else: proxy through (trusted repos, UI, API)
    location / {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
        proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
    }
}
