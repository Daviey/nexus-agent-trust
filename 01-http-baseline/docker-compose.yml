services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: poc-nexus
    ports:
      - "18081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - poc-net

  gateway:
    image: nginx:alpine
    container_name: poc-gateway
    ports:
      - "28080:8080"
      - "28082:8082"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nexus:
        condition: service_started
    networks:
      - poc-net

  forward-proxy:
    build: ./forward-proxy
    container_name: poc-forward-proxy
    ports:
      - "23128:3128"
    depends_on:
      - gateway
    networks:
      - poc-net

  nexus-init:
    image: alpine:latest
    container_name: poc-nexus-init
    depends_on:
      nexus:
        condition: service_started
    volumes:
      - nexus-data:/nexus-data
      - ./init:/init:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && exec /bin/sh /init/setup-nexus.sh"]
    networks:
      - poc-net

  tester:
    image: alpine:latest
    container_name: poc-tester
    depends_on:
      nexus-init:
        condition: service_completed_successfully
      forward-proxy:
        condition: service_started
    volumes:
      - ./test:/test:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && exec /bin/sh /test/run-tests.sh"]
    networks:
      - poc-net

volumes:
  nexus-data:

networks:
  poc-net:
    driver: bridge
