# Mock registry: serves static JSON responses.
# /npm-agent/ is the scoped path (wrappers use this).
# /full/ simulates the unrestricted path (what agents should NOT use).

server {
    listen 80;

    # Scoped registry: serves a mock package list
    location /npm-agent/ {
        default_type application/json;
        return 200 '{"name":"scoped-mock","dist":{"tarball":"http://mock-registry/npm-agent/mock-1.0.0.tgz"}}';
    }

    location /full/ {
        default_type application/json;
        return 200 '{"name":"full-mock","dist":{"tarball":"http://mock-registry/full/mock-1.0.0.tgz"}}';
    }

    location / {
        default_type text/plain;
        return 200 'mock-registry';
    }
}
