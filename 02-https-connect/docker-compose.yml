services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: https-nexus
    ports:
      - "18081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - poc-net

  gateway:
    image: nginx:alpine
    container_name: https-gateway
    ports:
      - "34443:4443"
      - "38443:8443"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      nexus:
        condition: service_started
    networks:
      - poc-net

  forward-proxy:
    build:
      context: ../01-http-baseline/forward-proxy
    container_name: https-proxy
    environment:
      - FULL_PORT=4443
      - SCOPED_PORT=8443
    ports:
      - "3128:3128"
    depends_on:
      - gateway
    networks:
      - poc-net

  nexus-init:
    image: alpine:latest
    depends_on:
      nexus:
        condition: service_started
    volumes:
      - nexus-data:/nexus-data
      - ./certs:/certs:ro
      - ./init:/init:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && exec /bin/sh /init/setup-nexus.sh"]
    networks:
      - poc-net

  tester:
    image: alpine:latest
    depends_on:
      nexus-init:
        condition: service_completed_successfully
      forward-proxy:
        condition: service_started
    volumes:
      - ./certs/ca-cert.pem:/etc/ssl/certs/poc-ca.pem:ro
      - ./test:/test:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && exec /bin/sh /test/run-tests.sh"]
    networks:
      - poc-net

volumes:
  nexus-data:

networks:
  poc-net:
    driver: bridge
