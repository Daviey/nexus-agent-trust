# ─────────────────────────────────────────────────────────────
# Port 8080 — FULL access (simulates human direct connection)
# ─────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────
# Port 8082 — SCOPED access (simulates agent traffic via proxy)
# Only allowlisted repositories are accessible. Everything else
# under /repository/ returns 403.
#
# In the recommended architecture this filtering would live in a
# Nexus plugin reading getLocalPort(). Here we use nginx path rules
# for the PoC to keep the demo self-contained.
# ─────────────────────────────────────────────────────────────
server {
    listen 8082;
    server_name _;

    # Allowlisted repos — each gets its own location block
    location /repository/trusted/ {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block all other repositories
    location /repository/ {
        return 403;
    }

    # Allow Nexus UI and API for browsing (not for artifact download)
    location / {
        proxy_pass http://nexus:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
